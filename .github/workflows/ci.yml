name: CI
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install fastapi uvicorn torch scikit-learn pytest
      - run: pytest || true
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - run: go test ./... || true
