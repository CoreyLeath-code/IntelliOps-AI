name: IntelliOps Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  release-artifacts:
    name: Publish Release Artifacts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build source archive
        run: |
          mkdir -p dist
          tar --exclude=.git --exclude=dist -czf dist/intelliops-ai-${GITHUB_REF_NAME}.tar.gz .
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.tar.gz
          generate_release_notes: true

  publish-images:
    name: Publish Application Images
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: ml-model
            context: services/ml-model-pytorch
          - name: prediction-api
            context: services/prediction-api-go
          - name: dashboard
            context: frontend/dashboard-ts
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/${{ github.repository }}/${{ matrix.name }}
      - uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
