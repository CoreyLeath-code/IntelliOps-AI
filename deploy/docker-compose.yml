version: '3.9'
services:
  ml-model:
    build: ../services/ml-model-pytorch
    ports:
      - '8001:8001'

  go-api:
    build: ../services/prediction-api-go
    ports:
      - '8080:8080'
    environment:
      - MODEL_SERVICE_URL=http://ml-model:8001/predict
    depends_on:
      - ml-model

  dashboard:
    build: ../frontend/dashboard-ts
    ports:
      - '3001:80'

  prometheus:
    image: prom/prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - '9090:9090'

  grafana:
    image: grafana/grafana
    ports:
      - '3000:3000'
