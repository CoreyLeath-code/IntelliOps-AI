version: "3.9"

services:
  ml-model:
    build: ./services/ml-model-pytorch
    container_name: intelliops-ml-model
    ports:
      - "8001:8001"

  go-api:
    build: ./services/prediction-api-go
    container_name: intelliops-go-api
    ports:
      - "8080:8080"
    depends_on:
      - ml-model

  dashboard:
    build: ./frontend/dashboard-ts
    container_name: intelliops-dashboard
    ports:
      - "3001:80"
    depends_on:
      - go-api

  prometheus:
    image: prom/prometheus
    container_name: intelliops-prometheus
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana
    container_name: intelliops-grafana
    ports:
      - "3000:3000"
