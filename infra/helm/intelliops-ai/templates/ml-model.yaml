apiVersion: apps/v1
kind: Deployment
metadata:
  name: ml-model
spec:
  replicas: {{ .Values.mlModel.replicaCount }}
  selector:
    matchLabels:
      app: ml-model
  template:
    metadata:
      labels:
        app: ml-model
    spec:
      containers:
        - name: ml-model
          image: {{ .Values.mlModel.image }}
          ports:
            - containerPort: 8001
---
apiVersion: v1
kind: Service
metadata:
  name: ml-model
spec:
  selector:
    app: ml-model
  ports:
    - port: 8001
      targetPort: 8001
